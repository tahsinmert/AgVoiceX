name: Documentation issue
description: Report unclear, missing, or outdated documentation.
title: "docs: "
labels: ["documentation", "needs-triage"]
body:
  - type: textarea
    id: location
    attributes:
      label: Location
      description: Link or path to the documentation section.
    validations:
      required: true
  - type: textarea
    id: issue
    attributes:
      label: Issue
      description: What is wrong, missing, or confusing?
    validations:
      required: true
  - type: textarea
    id: suggestion
    attributes:
      label: Suggested Change
